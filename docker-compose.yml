version: '3.8'

services:
  samba4-manager:
    build: .
    container_name: samba4-manager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - samba4_data:/app
      - ./config.toml:/etc/samba4-manager/config.toml:ro
    environment:
      - SAMBA4_LDAP_PASS=${SAMBA4_LDAP_PASS:-secretpassword}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  samba4_data:
